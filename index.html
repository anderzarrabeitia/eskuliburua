<body>
  <div id="root"><p style="padding:40px;text-align:center;color:#999">Kargatzen...</p></div>
  <div id="error-box" style="display:none;padding:20px;margin:20px;background:#fef2f2;border:2px solid #ef4444;border-radius:8px;font-family:monospace;font-size:13px;white-space:pre-wrap;color:#991b1b;max-height:80vh;overflow:auto"></div>
  <script id="app-source" type="text/plain">
const { useState, useEffect, useRef, useMemo } = React;

const ETAPAK = ["HE", "HH", "LH", "DBH"];
const MAILAK = {
  HE: ["HE0-1", "HE1-2"],
  HH: ["HH2", "HH3", "HH4", "HH5"],
  LH: ["LH1", "LH2", "LH3", "LH4", "LH5", "LH6"],
  DBH: ["DBH1", "DBH2", "DBH3", "DBH4", "DC3", "DC4"],
};
const ROLAK_IRAKASLEGOA = ["Tutorea", "Arloko irakaslea", "PT", "PRL irakaslea", "Beste motatako irakaslea", "TEJI", "Etapa koordinatzailea", "Orientatzailea"];
const ROLAK_PAS = ["EAE", "Idazkaria", "Administratzailea", "Atezaina", "Mantenua", "Beste motatako PAS"];
const ROLAK_OROKORRA = ["Prozesu/proiektu koordinatzailea", "Prozesu/proiektu kidea"];

const KATEGORIAK_LEHENESPENAK = [
  { id: "ebaluazioa", izena: "Ebaluazioa", kolorea: "#3b82f6" },
  { id: "dokumentazioa", izena: "Dokumentazioa", kolorea: "#8b5cf6" },
  { id: "zirkularra", izena: "Zirkularra", kolorea: "#f59e0b" },
  { id: "koordinazioa", izena: "Koordinazioa", kolorea: "#10b981" },
  { id: "logistika", izena: "Logistika", kolorea: "#ef4444" },
  { id: "formakuntza", izena: "Formakuntza", kolorea: "#ec4899" },
  { id: "bestelakoa", izena: "Bestelakoa", kolorea: "#6b7280" },
];

// LANGILEAK eta ATAZAK hutsik — kanpaina bakoitzak bere datuak ditu JSON fitxategian
const LANGILEAK_HUTSIK = [];

const mkId = () => `ataza_${Date.now()}_${Math.random().toString(36).substr(2, 6)}`;

const emptyTask = () => ({ id: mkId(), izenburua: "", mota: "egutegikoa", data: "", ordua: null, argibideak: "", estekak: [], arduradunak: [], informatiboak: [], kategoria: "bestelakoa", filtroak: { etapak: [] }, irudia: null });

const defaultCampaign = () => ({
  izena: "Kanpaina berria", ikasturtea: "", pasahitza: "eami2026",
  mota: "kurtso_bukaera", sortzeData: toDateStr(new Date()), url: "",
  etapak: [...ETAPAK], mailak: JSON.parse(JSON.stringify(MAILAK)),
  rolIrakaslegoa: [...ROLAK_IRAKASLEGOA], rolPas: [...ROLAK_PAS], rolOrokorra: [...ROLAK_OROKORRA],
  kategoriak: JSON.parse(JSON.stringify(KATEGORIAK_LEHENESPENAK)),
  langileak: [],
  atazak: [],
});

const normalizeTask = (t) => ({
  ...t,
  kategoria: t.kategoria || "bestelakoa",
  filtroak: t.filtroak || { etapak: [] },
  estekak: t.estekak || [],
  irudia: t.irudia || null,
});
const normalizeCampaign = (c) => ({
  ...c,
  url: c.url || "",
  sortzeData: c.sortzeData || toDateStr(new Date()),
  kategoriak: c.kategoriak || JSON.parse(JSON.stringify(KATEGORIAK_LEHENESPENAK)),
  atazak: (c.atazak || []).map(normalizeTask),
});

const fmtDate = (d) => {
  if (!d) return "—";
  const dt = new Date(d + "T12:00:00");
  const days = ["Ig.", "Al.", "Ar.", "Az.", "Og.", "Or.", "Lr."];
  const months = ["Urt.", "Ots.", "Mar.", "Api.", "Mai.", "Eka.", "Uzt.", "Abu.", "Ira.", "Urr.", "Aza.", "Abe."];
  return `${days[dt.getDay()]} ${dt.getDate()} ${months[dt.getMonth()]}`;
};

// Timezone-safe date string (avoids UTC shift from toISOString)
const toDateStr = (d) => {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
};

const getAssignLabel = (a, langileak) => {
  if (a.mota === "pertsona") { const p = langileak.find(l => l.id === a.balioa); return p ? p.izena : a.balioa; }
  return a.balioa;
};
const MOTA_ICONS = { pertsona: "👤", rola: "🏷️", etapa: "🏫", maila: "📚" };
const ETAPA_COLORS = { HE: "#8b5cf6", HH: "#f59e0b", LH: "#10b981", DBH: "#3b82f6" };

// Excel template download
const downloadExcelTemplate = (type) => {
  if (typeof XLSX === "undefined") { alert("XLSX liburutegia ez dago kargatuta."); return; }
  const wb = XLSX.utils.book_new();
  if (type === "langileak") {
    const data = [
      ["izena", "emaila", "etapa", "maila", "rolak"],
      ["Adibidea Izena", "adibidea@eskola.com", "LH", "LH3", "Tutorea"],
      ["Beste Bat", "bestebat@eskola.com", "DBH", "", "Arloko irakaslea, PT"],
    ];
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(data), "Langileak");
  } else {
    const data = [
      ["izenburua", "mota", "data", "argibideak"],
      ["Adibide ataza", "egutegikoa", "2026-06-15", "Hemen argibideak jarri"],
      ["Beste ataza bat", "orokorra", "2026-06-30", "Mugaeguna duen ataza"],
    ];
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(data), "Atazak");
  }
  XLSX.writeFile(wb, type + "_txantiloia.xlsx");
};

// Excel import handler
const handleExcelImport = (e, type, campaign, upCamp) => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      if (typeof XLSX === "undefined") { alert("XLSX liburutegia ez dago kargatuta."); return; }
      const wb = XLSX.read(ev.target.result, { type: "array" });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws);
      if (type === "langileak") {
        const newStaff = rows.map((r, i) => ({
          id: `import_${Date.now()}_${i}`,
          izena: r.izena || r.Izena || r.nombre || "",
          email: r.emaila || r.Emaila || r.email || "",
          etapa: r.etapa || r.Etapa || null,
          maila: r.maila || r.Maila || null,
          rolak: (r.rolak || r.Rolak || "").split(",").map(s => s.trim()).filter(Boolean),
        })).filter(l => l.izena);
        upCamp({ langileak: [...campaign.langileak, ...newStaff] });
        alert(`${newStaff.length} langile inportatu dira.`);
      } else {
        const newTasks = rows.map((r, i) => ({
          ...emptyTask(),
          id: `import_${Date.now()}_${i}`,
          izenburua: r.izenburua || r.Izenburua || r.titulo || "",
          mota: (r.mota || r.Mota || "egutegikoa").toLowerCase().includes("orokor") ? "orokorra" : "egutegikoa",
          data: r.data || r.Data || r.fecha || "",
          argibideak: r.argibideak || r.Argibideak || r.descripcion || "",
        })).filter(t => t.izenburua);
        upCamp({ atazak: [...campaign.atazak, ...newTasks] });
        alert(`${newTasks.length} ataza inportatu dira.`);
      }
    } catch (err) { alert("Errorea fitxategia irakurtzean: " + err.message); }
  };
  reader.readAsArrayBuffer(file); e.target.value = "";
};

// ─── Inline Confirm Dialog ───
function ConfirmDialog({ message, onConfirm, onCancel }) {
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.3)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 200 }}>
      <div style={{ background: "#fff", borderRadius: 12, padding: "24px 28px", maxWidth: 380, width: "90%", boxShadow: "0 20px 60px rgba(0,0,0,0.15)", textAlign: "center" }}>
        <div style={{ fontSize: 32, marginBottom: 12 }}>⚠️</div>
        <p style={{ color: "#374151", fontSize: 14, margin: "0 0 20px", lineHeight: 1.5 }}>{message}</p>
        <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
          <button onClick={onCancel} style={{ ...S.btnSec, padding: "8px 20px" }}>Utzi</button>
          <button onClick={onConfirm} style={{ background: "#ef4444", color: "#fff", border: "none", padding: "8px 20px", borderRadius: 8, fontWeight: 600, fontSize: 13, cursor: "pointer", fontFamily: "inherit" }}>Ezabatu</button>
        </div>
      </div>
    </div>
  );
}

// ─── Download Modal ───
function DownloadModal({ data, filename, onClose, showToast }) {
  const [copied, setCopied] = useState(false);
  const [showRaw, setShowRaw] = useState(false);
  const jsonStr = JSON.stringify(data, null, 2);
  const textRef = useRef(null);

  const handleDownload = () => {
    try {
      const blob = new Blob([jsonStr], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      showToast("Deskargatzen...");
    } catch (err) {
      showToast("Deskargak ez du funtzionatu — erabili kopiatu botoia");
    }
  };

  const handleCopy = () => {
    navigator.clipboard.writeText(jsonStr).then(() => {
      setCopied(true); showToast("JSON kopiatu da arbelera!");
      setTimeout(() => setCopied(false), 3000);
    }).catch(() => {
      if (textRef.current) { textRef.current.select(); document.execCommand("copy"); showToast("Kopiatu da!"); setCopied(true); }
    });
  };

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.3)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 200 }}
      onClick={onClose}>
      <div style={{ background: "#fff", borderRadius: 14, padding: "28px 32px", maxWidth: 520, width: "92%", boxShadow: "0 20px 60px rgba(0,0,0,0.15)", maxHeight: "90vh", overflow: "auto" }}
        onClick={e => e.stopPropagation()}>
        <h3 style={{ color: "#1e3a5f", margin: "0 0 8px", fontSize: 18, fontFamily: "'Source Serif 4', serif" }}>💾 Kanpaina esportatu</h3>

        <div style={{ background: "#faf8f5", borderRadius: 8, padding: "10px 14px", marginBottom: 20, border: "1px solid #e5ddd3" }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: "#1e3a5f" }}>📄 {filename}</div>
          <div style={{ fontSize: 11, color: "#8b7e74", marginTop: 2 }}>{(data.atazak && data.atazak.length) || 0} ataza · {(data.langileak && data.langileak.length) || 0} langile · {(jsonStr.length / 1024).toFixed(1)} KB</div>
        </div>

        <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 12 }}>
          <button onClick={handleDownload} style={{
            width: "100%", padding: "14px 20px", borderRadius: 10, border: "none", fontSize: 15, fontWeight: 700,
            cursor: "pointer", fontFamily: "inherit", background: "#1e3a5f", color: "#fff",
          }}>
            ⬇️ Deskargatu .json fitxategia
          </button>

          <button onClick={handleCopy} style={{
            width: "100%", padding: "10px 20px", borderRadius: 8, fontSize: 13,
            cursor: "pointer", fontFamily: "inherit",
            background: copied ? "#ecfdf5" : "#fff", color: copied ? "#10b981" : "#6b7280",
            border: `1px solid ${copied ? "#10b981" : "#d1d5db"}`, fontWeight: copied ? 600 : 400,
          }}>
            {copied ? "✅ Kopiatu da arbelera!" : "📋 Kopiatu arbelera (alternatiba)"}
          </button>
        </div>

        <button onClick={() => setShowRaw(!showRaw)} style={{ ...S.btnSm, width: "100%", marginBottom: showRaw ? 8 : 0 }}>
          {showRaw ? "▲ Ezkutatu JSON" : "▼ Erakutsi JSON testua"}
        </button>

        {showRaw && (
          <textarea ref={textRef} readOnly value={jsonStr} style={{
            width: "100%", height: 200, background: "#1f2937", color: "#a5f3fc", borderRadius: 8,
            padding: 12, fontSize: 11, fontFamily: "monospace", border: "none", resize: "vertical",
            boxSizing: "border-box", marginBottom: 8,
          }} onFocus={e => e.target.select()} />
        )}

        <button onClick={onClose} style={{ ...S.btnSec, width: "100%", marginTop: 8 }}>Itxi</button>
      </div>
    </div>
  );
}

// ─── Main App ───
function App() {
  const [view, setView] = useState("login");
  const [campaign, setCampaign] = useState(null);
  const [tab, setTab] = useState("atazak");
  const [editTask, setEditTask] = useState(null);
  const [editStaff, setEditStaff] = useState(null);
  const [filterEtapa, setFilterEtapa] = useState("all");
  const [searchText, setSearchText] = useState("");
  const [showTaskForm, setShowTaskForm] = useState(false);
  const [toast, setToast] = useState(null);
  const [confirmAction, setConfirmAction] = useState(null);
  const [sidebarOpen, setSidebarOpen] = useState(typeof window !== "undefined" && window.innerWidth > 768);
  const [userCampaign, setUserCampaign] = useState(() => { try { return JSON.parse(localStorage.getItem("eami_user_campaign")); } catch(e) { return null; } });
  const [userProfile, setUserProfile] = useState(() => { try { return JSON.parse(localStorage.getItem("eami_user_profile")); } catch(e) { return null; } });
  const [completedTasks, setCompletedTasks] = useState(() => { try { return JSON.parse(localStorage.getItem("eami_completed")) || {}; } catch(e) { return {}; } });
  const [enterLoading, setEnterLoading] = useState(false);
  const [profilesKey, setProfilesKey] = useState(0);
  const fileRef = useRef();
  const userFileRef = useRef();

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2500); };
  const askConfirm = (message, action) => setConfirmAction({ message, action });

  // User mode helpers
  const saveUserCampaign = (data) => { setUserCampaign(data); localStorage.setItem("eami_user_campaign", JSON.stringify(data)); };
  const saveUserProfile = (prof) => {
    setUserProfile(prof); localStorage.setItem("eami_user_profile", JSON.stringify(prof));
    // Maintain profiles list for profile switching
    const saved = JSON.parse(localStorage.getItem("eami_profiles_list") || "[]");
    const idx = saved.findIndex(p => p.id === prof.id);
    if (idx >= 0) saved[idx] = prof; else saved.push(prof);
    localStorage.setItem("eami_profiles_list", JSON.stringify(saved));
  };

  // Resolve Google Drive URL to direct download
  const resolveUrl = (rawUrl) => {
    let url = rawUrl;
    const driveMatch = url.match(/drive\.google\.com\/file\/d\/([^\/]+)/);
    if (driveMatch) url = "https://drive.google.com/uc?export=download&id=" + driveMatch[1];
    const driveMatch2 = url.match(/drive\.google\.com.*[?&]id=([^&]+)/);
    if (!driveMatch && driveMatch2) url = "https://drive.google.com/uc?export=download&id=" + driveMatch2[1];
    return url;
  };

  // Enter user mode: auto-update from URL if available, then enter
  const enterUserMode = function() {
    if (!userCampaign) return;
    var ucUrl = userCampaign.url;
    if (ucUrl) {
      setEnterLoading(true);
      var url = resolveUrl(ucUrl);
      var cacheBuster = (url.includes("?") ? "&" : "?") + "_t=" + Date.now();
      fetch(url + cacheBuster, { cache: "no-store" })
        .then(function(res) { if (!res.ok) throw new Error("HTTP " + res.status); return res.text(); })
        .then(function(text) {
          var data = JSON.parse(text);
          if (!data.atazak) throw new Error("Ez da kanpaina fitxategi bat");
          saveUserCampaign(normalizeCampaign(data));
          showToast("✅ Eguneratuta!");
        })
        .catch(function(err) {
          showToast("⚠️ Ezin eguneratu, aurrekoarekin sartzen");
        })
        .then(function() {
          setEnterLoading(false);
          if (userProfile) setView("user_main"); else setView("user_profile");
        });
    } else {
      if (userProfile) setView("user_main"); else setView("user_profile");
    }
  };

  const toggleComplete = (taskId) => {
    setCompletedTasks(prev => {
      const next = { ...prev }; if (next[taskId]) delete next[taskId]; else next[taskId] = Date.now();
      localStorage.setItem("eami_completed", JSON.stringify(next)); return next;
    });
  };
  const handleUserFileLoad = (e) => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        saveUserCampaign(normalizeCampaign(data));
        showToast("Kanpaina kargatuta");
        if (userProfile) setView("user_main"); else setView("user_profile");
      }
      catch(e) { alert("Fitxategia ezin da irakurri."); }
    };
    r.readAsText(f); e.target.value = "";
  };

  const handleNew = () => { setCampaign(normalizeCampaign(defaultCampaign())); setView("admin"); showToast("Kanpaina berria sortuta"); };
  const handleLoad = () => fileRef.current && fileRef.current.click();
  const [loadedFilename, setLoadedFilename] = useState(null);
  const [lastAutoSave, setLastAutoSave] = useState(null);
  const handleFileLoad = (e) => {
    const f = e.target.files[0]; if (!f) return;
    const fname = f.name;
    const r = new FileReader();
    r.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        const pw = prompt("Sartu kanpainaren pasahitza:");
        if (pw !== data.pasahitza) { alert("Pasahitz okerra!"); return; }
        setCampaign(normalizeCampaign(data)); setLoadedFilename(fname); setView("admin"); showToast("Kanpaina kargatuta");
      } catch(e) { alert("Fitxategia ezin da irakurri."); }
    };
    r.readAsText(f); e.target.value = "";
  };

  // Download helper
  const downloadJSON = (data, filename) => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url; link.download = filename;
    document.body.appendChild(link); link.click();
    document.body.removeChild(link);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  };

  // Gorde = save with same name
  const handleSave = () => {
    if (!campaign) return;
    const fname = loadedFilename || `${campaign.izena.replace(/\s+/g, "_")}.json`;
    downloadJSON(campaign, fname);
    showToast(`💾 Gordeta: ${fname}`);
  };

  // Gorde honela = save with new name
  const handleSaveAs = () => {
    if (!campaign) return;
    const defaultName = campaign.izena.replace(/\s+/g, "_");
    const newName = prompt("Fitxategiaren izena:", defaultName);
    if (!newName) return;
    const fname = newName.endsWith(".json") ? newName : newName + ".json";
    downloadJSON(campaign, fname);
    setLoadedFilename(fname);
    showToast(`💾 Gordeta: ${fname}`);
  };

  // Autosave every 5 minutes
  useEffect(() => {
    if (!campaign || view !== "admin") return;
    const interval = setInterval(() => {
      localStorage.setItem("eami_admin_autosave", JSON.stringify(campaign));
      localStorage.setItem("eami_admin_autosave_filename", loadedFilename || "");
      setLastAutoSave(new Date());
    }, 5 * 60 * 1000); // 5 minutes
    return () => clearInterval(interval);
  }, [campaign, view, loadedFilename]);

  // Check for autosave on mount
  useEffect(() => {
    if (view === "login" && !campaign) {
      const saved = localStorage.getItem("eami_admin_autosave");
      if (saved) {
        try {
          const data = JSON.parse(saved);
          if (data.izena) {
            setAutoSaveRestore(data);
          }
        } catch(e) {}
      }
    }
  }, []);
  const [autoSaveRestore, setAutoSaveRestore] = useState(null);
  const [downloadData, setDownloadData] = useState(null);

  // Responsive sidebar
  useEffect(() => {
    var onResize = function() { setSidebarOpen(window.innerWidth > 768); };
    window.addEventListener("resize", onResize);
    return function() { window.removeEventListener("resize", onResize); };
  }, []);

  const upCamp = (u) => setCampaign(p => ({ ...p, ...u }));

  const saveTask = (t) => {
    setCampaign(prev => ({
      ...prev,
      atazak: prev.atazak.some(x => x.id === t.id) ? prev.atazak.map(x => x.id === t.id ? t : x) : [...prev.atazak, t]
    }));
    setEditTask(null); setShowTaskForm(false); showToast("Ataza gordeta");
  };
  const deleteTask = (id) => {
    askConfirm("Ataza hau ezabatu nahi duzu? Ekintza hau ezin da desegin.", () => {
      setCampaign(prev => ({ ...prev, atazak: prev.atazak.filter(t => t.id !== id) }));
      showToast("Ataza ezabatuta");
    });
  };
  const dupTask = (t) => {
    const d = { ...JSON.parse(JSON.stringify(t)), id: mkId(), izenburua: t.izenburua + " (kopia)" };
    setCampaign(prev => ({ ...prev, atazak: [...prev.atazak, d] }));
    showToast("Ataza bikoiztuta");
  };
  const saveStaff = (p) => {
    setCampaign(prev => ({
      ...prev,
      langileak: prev.langileak.some(x => x.id === p.id) ? prev.langileak.map(x => x.id === p.id ? p : x) : [...prev.langileak, p]
    }));
    setEditStaff(null); showToast("Langilea gordeta");
  };
  const deleteStaff = (id) => {

// ─── LIST VIEW ───
function TaskListView({ tasks, c, onEdit, onDel, onDup }) {
  const cal = tasks.filter(t => t.mota === "egutegikoa");
  const gen = tasks.filter(t => t.mota === "orokorra");

  const weeks = useMemo(() => {
    const m = new Map();
    cal.forEach(t => {
      const d = new Date(t.data + "T12:00:00");
      const mon = new Date(d); mon.setDate(d.getDate() - ((d.getDay() + 6) % 7));
      const fri = new Date(mon); fri.setDate(mon.getDate() + 4);
      const key = toDateStr(mon);
      if (!m.has(key)) m.set(key, { start: mon, end: fri, tasks: [] });
      m.get(key).tasks.push(t);
    });
    return [...m.entries()].sort((a, b) => a[0] < b[0] ? -1 : 1);
  }, [cal]);

  return (
    <>
      {weeks.map(([key, wk]) => (
        <div key={key} style={{ marginBottom: 20 }}>
          <div style={{ fontSize: 12, fontWeight: 600, color: "#8b7e74", textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8, paddingLeft: 4 }}>
            {fmtDate(key)} — {fmtDate(toDateStr(new Date(wk.end)))}
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
            {wk.tasks.map(t => <TaskRow key={t.id} t={t} c={c} onEdit={() => onEdit(t)} onDel={() => onDel(t.id)} onDup={() => onDup(t)} />)}
          </div>
        </div>
      ))}
      {gen.length > 0 && (
        <div style={{ marginTop: 8 }}>
          <div style={{ fontSize: 12, fontWeight: 600, color: "#8b7e74", textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8, paddingLeft: 4 }}>
            📌 Mugaegunarekin ({gen.length})
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
            {gen.map(t => <TaskRow key={t.id} t={t} c={c} onEdit={() => onEdit(t)} onDel={() => onDel(t.id)} onDup={() => onDup(t)} />)}
          </div>
        </div>
      )}
      {tasks.length === 0 && <p style={{ color: "#9ca3af", textAlign: "center", padding: 40 }}>Ez dago atazorik iragazki honekin.</p>}
    </>
  );
}

// ─── CALENDAR VIEW ───
function CalendarView({ tasks, c, onEdit, onDel, onDup }) {
  const calTasks = tasks.filter(t => t.mota === "egutegikoa" && t.data);
  const genTasks = tasks.filter(t => t.mota === "orokorra");

  // Find date range from tasks
  const dates = calTasks.map(t => t.data).sort();
  const today = toDateStr(new Date());

  // Determine visible weeks: from first task's Monday to last task's Friday
  const weeks = useMemo(() => {
    if (dates.length === 0) return [];
    const first = new Date(dates[0] + "T12:00:00");
    const last = new Date(dates[dates.length - 1] + "T12:00:00");
    // Monday of first week
    const startMon = new Date(first);
    startMon.setDate(first.getDate() - ((first.getDay() + 6) % 7));
    // Friday of last week
    const endFri = new Date(last);
    const dayOfWeek = (last.getDay() + 6) % 7; // 0=Mon, 4=Fri
    endFri.setDate(last.getDate() + (4 - dayOfWeek));

    const wks = [];
    const cursor = new Date(startMon);
    while (cursor <= endFri) {
      const week = [];
      for (let i = 0; i < 5; i++) { // Mon-Fri
        week.push(toDateStr(new Date(cursor)));
        cursor.setDate(cursor.getDate() + 1);
      }
      wks.push(week);
      cursor.setDate(cursor.getDate() + 2); // skip Sat-Sun
    }
    return wks;
  }, [dates]);

  // Tasks by date
  const byDate = useMemo(() => {
    const m = {};
    calTasks.forEach(t => {
      if (!m[t.data]) m[t.data] = [];
      m[t.data].push(t);
    });
    return m;
  }, [calTasks]);

  const dayNames = ["Al.", "Ar.", "Az.", "Og.", "Or."];
  const monthNames = ["Urtarila", "Otsaila", "Martxoa", "Apirila", "Maiatza", "Ekaina", "Uztaila", "Abuztua", "Iraila", "Urria", "Azaroa", "Abendua"];

  if (weeks.length === 0) return <p style={{ color: "#9ca3af", textAlign: "center", padding: 40 }}>Ez dago egutegiko atazorik.</p>;

  return (
    <div>
      {/* Calendar grid */}
      <div style={{ background: "#fff", borderRadius: 12, border: "2px solid #c4bdb4", overflow: "hidden", boxShadow: "0 2px 12px rgba(0,0,0,0.08)" }}>
        {/* Day headers */}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(5, minmax(0, 1fr))", borderBottom: "2px solid #e5ddd3" }}>
          {dayNames.map(d => (
            <div key={d} style={{ padding: "8px 12px", fontSize: 12, fontWeight: 700, color: "#8b7e74", textAlign: "center", textTransform: "uppercase", letterSpacing: 0.5, minWidth: 0 }}>{d}</div>
          ))}
        </div>

        {/* Weeks */}
        {weeks.map((week, wi) => {
          // Month label for first day of week if it's a new month
          const firstDate = new Date(week[0] + "T12:00:00");
          const prevWeekLastDate = wi > 0 ? new Date(weeks[wi - 1][4] + "T12:00:00") : null;
          const showMonth = wi === 0 || (prevWeekLastDate && firstDate.getMonth() !== prevWeekLastDate.getMonth());

          return (
            <div key={wi}>
              {showMonth && (
                <div style={{ padding: "10px 16px 4px", fontSize: 14, fontWeight: 700, color: "#1e3a5f", fontFamily: "'Source Serif 4', serif", background: "#faf8f5", borderTop: wi > 0 ? "2px solid #e5ddd3" : "none" }}>
                  {monthNames[firstDate.getMonth()]} {firstDate.getFullYear()}
                </div>
              )}
              <div style={{ display: "grid", gridTemplateColumns: "repeat(5, minmax(0, 1fr))", minHeight: 90, borderBottom: "2px solid #e5ddd3" }}>
                {week.map((dateStr, di) => {
                  const dt = new Date(dateStr + "T12:00:00");
                  const dayTasks = byDate[dateStr] || [];
                  const isToday = dateStr === today;
                  const hasTasks = dayTasks.length > 0;

                  return (
                    <div key={dateStr} style={{
                      borderRight: di < 4 ? "1px solid #e5ddd3" : "none",
                      padding: "6px 8px", minWidth: 0, overflow: "hidden",
                      background: isToday ? "#dbeafe" : hasTasks ? (wi % 2 === 0 ? "#faf8f5" : "#fff") : (wi % 2 === 0 ? "#f5f1eb" : "#faf8f5"),
                      minHeight: 90,
                    }}>
                      {/* Day number */}
                      <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 4 }}>
                        <span style={{
                          fontSize: 14, fontWeight: 700,
                          color: isToday ? "#fff" : dayTasks.length > 0 ? "#1e3a5f" : "#c4bdb4",
                          background: isToday ? "#3b82f6" : "transparent",
                          borderRadius: "50%", width: 26, height: 26, display: "flex", alignItems: "center", justifyContent: "center",
                        }}>{dt.getDate()}</span>
                      </div>

                      {/* Task chips */}
                      <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
                        {dayTasks.map(t => {
                          const kat = (c.kategoriak || KATEGORIAK_LEHENESPENAK).find(k => k.id === t.kategoria);
                          const katColor = (kat && kat.kolorea) || "#6b7280";
                          return (
                            <div key={t.id} onClick={() => onEdit(t)} title={t.izenburua}
                              style={{
                                background: katColor + "15", borderLeft: `3px solid ${katColor}`,
                                borderRadius: 5, padding: "4px 8px", fontSize: 13, fontWeight: 500,
                                color: "#374151", cursor: "pointer", lineHeight: 1.35,
                                whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
                                transition: "transform .1s",
                              }}
                              onMouseEnter={e => e.currentTarget.style.transform = "scale(1.03)"}
                              onMouseLeave={e => e.currentTarget.style.transform = "scale(1)"}>
                              {t.ordua && <span style={{ marginRight: 3, opacity: 0.6, fontSize: 10 }}>⏰</span>}
                              {t.izenburua}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>

      {/* General tasks below calendar */}
      {genTasks.length > 0 && (
        <div style={{ marginTop: 20 }}>
          <div style={{ fontSize: 12, fontWeight: 600, color: "#8b7e74", textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8, paddingLeft: 4 }}>
            📌 Mugaegunarekin — data zehatzik gabe ({genTasks.length})
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(260px, 1fr))", gap: 6 }}>
            {genTasks.map(t => {
              const etapas = [...new Set([...t.arduradunak, ...t.informatiboak].filter(a => a.mota === "etapa").map(a => a.balioa))];
              return (
                <div key={t.id} onClick={() => onEdit(t)} style={{
                  background: "#fff", border: "1px solid #e5ddd3", borderRadius: 8, padding: "8px 12px",
                  cursor: "pointer", transition: "box-shadow .15s",
                  borderLeft: `3px solid #d97706`,
                }} onMouseEnter={e => e.currentTarget.style.boxShadow = "0 2px 8px rgba(0,0,0,0.06)"}
                   onMouseLeave={e => e.currentTarget.style.boxShadow = "none"}>
                  <div style={{ fontWeight: 600, fontSize: 12, color: "#1f2937" }}>{t.izenburua}</div>
                  <div style={{ fontSize: 10, color: "#9ca3af", marginTop: 2 }}>
                    Mugaeguna: {fmtDate(t.data)} {etapas.length > 0 && `· ${etapas.join(", ")}`}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

function TaskRow({ t, c, onEdit, onDel, onDup }) {
  const ard = t.arduradunak.map(a => getAssignLabel(a, c.langileak)).join(", ");
  const etapas = [...new Set([...t.arduradunak, ...t.informatiboak].filter(a => a.mota === "etapa").map(a => a.balioa))];

    <div onClick={onEdit} style={{ background: "#fff", border: "1px solid #e5ddd3", borderRadius: 10, padding: "10px 16px",
      display: "flex", alignItems: "center", gap: 14, cursor: "pointer", transition: "box-shadow .15s",
    }} onMouseEnter={e => e.currentTarget.style.boxShadow = "0 2px 8px rgba(0,0,0,0.06)"}
       onMouseLeave={e => e.currentTarget.style.boxShadow = "none"}>

        {t.ordua && <div style={{ color: "#d97706", fontSize: 11 }}>⏰ {t.ordua}</div>}
      </div>
      <div style={{ display: "flex", gap: 3 }}>
        {etapas.map(e => <span key={e} style={{ background: ETAPA_COLORS[e] || "#6b7280", color: "#fff", borderRadius: 4, padding: "1px 6px", fontSize: 10, fontWeight: 600 }}>{e}</span>)}
      </div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontWeight: 600, fontSize: 13, color: "#1f2937", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{t.izenburua}</div>
        <div style={{ fontSize: 11, color: "#9ca3af", marginTop: 1, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{ard || "Esleipenik gabe"}</div>
      </div>
      <div style={{ display: "flex", gap: 2, flexShrink: 0 }}>
        {(t.estekak || []).length > 0 && <span style={{ fontSize: 11, color: "#9ca3af", marginRight: 4 }}>🔗{(t.estekak || []).length}</span>}
        <button onClick={e => { e.stopPropagation(); onDup(); }} style={S.btnIcon} title="Bikoiztu">📋</button>
        <button onClick={e => { e.stopPropagation(); onDel(); }} style={{ ...S.btnIcon, color: "#ef4444" }} title="Ezabatu">🗑️</button>
      </div>
    </div>
  );
}

// ─── TASK MODAL ───
function TaskModal({ task, c, onSave, onClose }) {
  const [f, setF] = useState(JSON.parse(JSON.stringify(task)));
  const [nl, setNl] = useState({ izena: "", url: "", ruta: "" });
  const [at, setAt] = useState("arduradunak");
  const up = (k, v) => setF(p => ({ ...p, [k]: v }));
  const allRoles = [...(c.rolIrakaslegoa || ROLAK_IRAKASLEGOA), ...(c.rolPas || ROLAK_PAS), ...(c.rolOrokorra || ROLAK_OROKORRA)];
  const allMailak = Object.values(c.mailak || MAILAK).flat();
  const sortedLangileak = [...c.langileak].sort((a, b) => a.izena.localeCompare(b.izena, "eu"));

  const addA = (list, mota, val) => { if (!val) return; const a = [...f[list]]; if (!a.some(x => x.mota === mota && x.balioa === val)) { a.push({ mota, balioa: val }); up(list, a); } };
  const remA = (list, i) => { const a = [...f[list]]; a.splice(i, 1); up(list, a); };
  const addL = () => { if (!nl.izena) return; up("estekak", [...(f.estekak || []), { ...nl }]); setNl({ izena: "", url: "", ruta: "" }); };
  const remL = (i) => { const a = [...(f.estekak || [])]; a.splice(i, 1); up("estekak", a); };
  const handleImageUpload = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => up("irudia", ev.target.result);
    reader.readAsDataURL(file); e.target.value = "";
  };

  const isArd = at === "arduradunak";
  const accent = isArd ? "#1e3a5f" : "#0d9488";

  return (
    <div style={S.overlay} onClick={onClose}>
      <div style={S.modal} onClick={e => e.stopPropagation()}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
          <h3 style={{ color: "#1e3a5f", margin: 0, fontFamily: "'Source Serif 4', serif", fontSize: 19 }}>
            {task.izenburua ? "Ataza editatu" : "Ataza berria"}
          </h3>
          <button onClick={onClose} style={{ ...S.btnIcon, fontSize: 18 }}>✕</button>
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 14 }}>
          <div style={{ gridColumn: "1/-1" }}>
            <label style={S.label}>Izenburua *</label>
            <input value={f.izenburua} onChange={e => up("izenburua", e.target.value)} style={S.input} placeholder="Atazaren izena" />
          </div>
          <div>
            <label style={S.label}>Mota</label>
            <select value={f.mota} onChange={e => up("mota", e.target.value)} style={S.select}>
              <option value="egutegikoa">📅 Egutegikoa</option>
              <option value="orokorra">📌 Orokorra (mugaeguna)</option>
            </select>
          </div>
          <div>
            <label style={S.label}>{f.mota === "egutegikoa" ? "Data" : "Mugaeguna"}</label>
            <input type="date" value={f.data} onChange={e => up("data", e.target.value)} style={S.input} />
          </div>
          <div>
            <label style={S.label}>Ordua (aukerakoa)</label>
            <input value={f.ordua || ""} onChange={e => up("ordua", e.target.value || null)} style={S.input} placeholder="adib. 13:30" />
          </div>
          <div>
            <label style={S.label}>Kategoria</label>
            <select value={f.kategoria || "bestelakoa"} onChange={e => up("kategoria", e.target.value)} style={S.select}>
              {(c.kategoriak || KATEGORIAK_LEHENESPENAK).map(k => (
                <option key={k.id} value={k.id}>{k.izena}</option>
              ))}
            </select>
          </div>
        </div>

        {/* Filtro etapak */}
        <div style={{ marginBottom: 14 }}>
          <label style={S.label}>Filtro etapak <span style={{ fontWeight: 400, textTransform: "none" }}>(hutsik = etapa guztietan aplikatzen da)</span></label>
          <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
            {(c.etapak || ETAPAK).map(e => {
              const active = ((f.filtroak && f.filtroak.etapak) || []).includes(e);
              return (
                <button key={e} onClick={() => {
                  const cur = (f.filtroak && f.filtroak.etapak) || [];
                  up("filtroak", { ...f.filtroak, etapak: active ? cur.filter(x => x !== e) : [...cur, e] });
                }} style={{
                  padding: "5px 14px", borderRadius: 7, border: `2px solid ${active ? ETAPA_COLORS[e] : "#d1d5db"}`,
                  background: active ? ETAPA_COLORS[e] + "18" : "#fff",
                  color: active ? ETAPA_COLORS[e] : "#9ca3af", fontSize: 12, fontWeight: 600,
                  cursor: "pointer", fontFamily: "inherit",
                }}>{e}</button>
              );
            })}
          </div>
        </div>

        <div style={{ marginBottom: 14 }}>
          <label style={S.label}>Argibideak</label>
          <textarea value={f.argibideak} onChange={e => up("argibideak", e.target.value)}
            style={{ ...S.input, minHeight: 72, resize: "vertical" }} placeholder="Nola egin, non egin, zer kontuan izan..." />
        </div>

        {/* Links */}
        <div style={{ marginBottom: 14 }}>
          <label style={S.label}>Estekak ({(f.estekak || []).length})</label>
          {(f.estekak || []).map((l, i) => (
            <div key={i} style={{ background: "#faf8f5", borderRadius: 8, padding: "8px 10px", marginBottom: 4, border: "1px solid #e5ddd3" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12 }}>
                <span style={{ flex: 1, color: "#1e3a5f", fontWeight: 600 }}>🔗 {l.izena}</span>
                <button onClick={() => remL(i)} style={{ ...S.btnIcon, fontSize: 11, color: "#ef4444" }}>✕</button>
              </div>
              {l.url && <div style={{ fontSize: 10, color: "#6b7280", marginTop: 2 }}>{l.url}</div>}
              {l.ruta && <div style={{ fontSize: 10, color: "#8b7e74", marginTop: 1 }}>📁 {l.ruta}</div>}
            </div>
          ))}
          <div style={{ background: "#f9fafb", borderRadius: 8, padding: 10, border: "1px dashed #d1d5db", marginTop: 6 }}>
            <div style={{ display: "flex", gap: 6, marginBottom: 4 }}>
              <input value={nl.izena} onChange={e => setNl(p => ({ ...p, izena: e.target.value }))} style={{ ...S.input, flex: 1 }} placeholder="Izena *" />
            </div>
            <div style={{ display: "flex", gap: 6, marginBottom: 4 }}>
              <input value={nl.url} onChange={e => setNl(p => ({ ...p, url: e.target.value }))} style={{ ...S.input, flex: 1 }} placeholder="URL (aukerakoa)" />
            </div>
            <div style={{ display: "flex", gap: 6 }}>
              <input value={nl.ruta} onChange={e => setNl(p => ({ ...p, ruta: e.target.value }))} style={{ ...S.input, flex: 1 }} placeholder="📁 Ruta (adib. DRIVE > Karpeta > Azpikarpeta)" />
              <button onClick={addL} style={{ ...S.btnSm, background: "#1e3a5f", color: "#fff", border: "none", whiteSpace: "nowrap" }}>+ Esteka</button>
            </div>
          </div>
        </div>

        {/* Image */}
        <div style={{ marginBottom: 14 }}>
          <label style={S.label}>Irudia (aukerakoa)</label>
          {f.irudia ? (
            <div style={{ position: "relative", display: "inline-block" }}>
              <img src={f.irudia} alt="" style={{ maxWidth: "100%", maxHeight: 200, borderRadius: 8, border: "1px solid #e5ddd3" }} />
              <button onClick={() => up("irudia", null)} style={{ position: "absolute", top: 4, right: 4, background: "#ef4444", color: "#fff", border: "none", borderRadius: "50%", width: 24, height: 24, fontSize: 12, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>✕</button>
            </div>
          ) : (
            <label style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "8px 14px", borderRadius: 8, border: "1px dashed #d1d5db", cursor: "pointer", fontSize: 12, color: "#6b7280" }}>
              📷 Irudia igo...
              <input type="file" accept="image/*" onChange={handleImageUpload} style={{ display: "none" }} />
            </label>
          )}
        </div>

        {/* Assignments */}
        <div style={{ marginBottom: 14 }}>
          <div style={{ display: "flex", gap: 6, marginBottom: 10 }}>
            {["arduradunak", "informatiboak"].map(x => (
              <button key={x} onClick={() => setAt(x)} style={{
                padding: "6px 14px", borderRadius: 8, border: `2px solid ${at === x ? (x === "arduradunak" ? "#1e3a5f" : "#0d9488") : "#e5ddd3"}`,
                background: at === x ? (x === "arduradunak" ? "#1e3a5f" : "#0d9488") : "#fff",
                color: at === x ? "#fff" : "#6b7280", fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
              }}>{x === "arduradunak" ? `🎯 Arduradunak (${f.arduradunak.length})` : `ℹ️ Informatiboak (${f.informatiboak.length})`}</button>
            ))}
          </div>
          <div style={{ background: "#faf8f5", borderRadius: 10, padding: 12, border: "1px solid #e5ddd3" }}>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 5, marginBottom: 10, minHeight: 28 }}>
              {f[at].length === 0 && <span style={{ fontSize: 12, color: "#9ca3af" }}>Esleipenik gabe</span>}
              {f[at].map((a, i) => (
                <span key={i} style={{ background: isArd ? "#e0e7ef" : "#ccfbf1", border: `1px solid ${isArd ? "#93a8c1" : "#5eead4"}`,
                  borderRadius: 6, padding: "3px 8px", fontSize: 12, color: isArd ? "#1e3a5f" : "#0d6e63",
                  display: "flex", alignItems: "center", gap: 4 }}>
                  {MOTA_ICONS[a.mota]} {getAssignLabel(a, c.langileak)}
                  <button onClick={() => remA(at, i)} style={{ background: "none", border: "none", color: "inherit", cursor: "pointer", fontSize: 10, padding: 0 }}>✕</button>
                </span>
              ))}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
              {[
                ["Pertsona", "pertsona", sortedLangileak.map(l => ({ v: l.id, l: l.izena }))],
                ["Rola", "rola", allRoles.map(r => ({ v: r, l: r }))],
                ["Etapa", "etapa", (c.etapak || ETAPAK).map(e => ({ v: e, l: e }))],
                ["Maila", "maila", allMailak.map(m => ({ v: m, l: m }))],
              ].map(([lbl, mota, opts]) => (
                <div key={mota}>
                  <label style={{ ...S.label, fontSize: 10 }}>{lbl}</label>
                  <select onChange={e => { addA(at, mota, e.target.value); e.target.value = ""; }} style={S.select} defaultValue="">
                    <option value="">Hautatu...</option>
                    {opts.map(o => <option key={o.v} value={o.v}>{o.l}</option>)}
                  </select>
                </div>
              ))}
            </div>
          </div>
        </div>

        <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
          <button onClick={onClose} style={S.btnSec}>Utzi</button>
          <button onClick={() => { if (!f.izenburua) return; onSave(f); }} style={S.btnPri}>💾 Gorde</button>
        </div>
      </div>
    </div>
  );
}

// ─── STAFF VIEW ───
function StaffView({ c, onEdit, onDel }) {
  const [fi, setFi] = useState("all");
  const [viewMode, setViewMode] = useState("panel");
  const groups = { HE: [], HH: [], LH: [], DBH: [], PT: [], EAE: [], PAS: [] };
  c.langileak.forEach(l => {
    if (l.rolak.includes("EAE")) groups.EAE.push(l);
    else if (l.rolak.includes("PT") && !l.rolak.includes("Tutorea")) groups.PT.push(l);
    else if (["Idazkaria", "Administratzailea", "Atezaina", "Mantenua"].some(r => l.rolak.includes(r))) groups.PAS.push(l);
    else if (l.etapa && groups[l.etapa]) groups[l.etapa].push(l);
    else groups.PAS.push(l);
  });
  const list = (fi === "all" ? c.langileak : (groups[fi] || [])).slice().sort((a, b) => a.izena.localeCompare(b.izena, "eu"));

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <h2 style={{ color: "#1e3a5f", fontSize: 22, margin: 0, fontFamily: "'Source Serif 4', serif" }}>Langileak</h2>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          <div style={{ display: "flex", background: "#fff", borderRadius: 8, padding: 2, border: "1px solid #e5ddd3" }}>
            {[{ id: "panel", icon: "▦" }, { id: "zerrenda", icon: "☰" }].map(v => (
              <button key={v.id} onClick={() => setViewMode(v.id)} style={{
                padding: "5px 10px", borderRadius: 6, border: "none", fontSize: 12, cursor: "pointer", fontFamily: "inherit",
                background: viewMode === v.id ? "#1e3a5f" : "transparent", color: viewMode === v.id ? "#fff" : "#6b7280",
              }}>{v.icon}</button>
            ))}
          </div>
          <button onClick={() => onEdit({ id: `new_${Date.now()}`, izena: "", etapa: null, maila: null, rolak: [], email: "" })} style={S.btnPri}>+ Langile berria</button>
        </div>
      </div>
      <div style={{ display: "flex", gap: 4, marginBottom: 16, flexWrap: "wrap", background: "#fff", borderRadius: 10, padding: 3, border: "1px solid #e5ddd3", width: "fit-content" }}>
        {["all", "HE", "HH", "LH", "DBH", "PT", "EAE", "PAS"].map(f => (
          <button key={f} onClick={() => setFi(f)} style={{
            padding: "5px 12px", borderRadius: 8, border: "none", fontSize: 12, cursor: "pointer", fontFamily: "inherit",
            fontWeight: fi === f ? 600 : 400,
            background: fi === f ? "#1e3a5f" : "transparent", color: fi === f ? "#fff" : "#6b7280",
          }}>{f === "all" ? "Guztiak" : f} ({f === "all" ? c.langileak.length : ((groups[f] || []).length)})</button>
        ))}
      </div>
      {viewMode === "panel" ? (
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 8 }}>
        {list.map(l => (
          <div key={l.id} style={{ background: "#fff", border: "1px solid #e5ddd3", borderRadius: 10, padding: "11px 16px", cursor: "pointer", transition: "box-shadow .15s",
            borderLeft: l.etapa ? `4px solid ${ETAPA_COLORS[l.etapa] || "#9ca3af"}` : "4px solid #9ca3af"
          }} onClick={() => onEdit(l)}
            onMouseEnter={e => e.currentTarget.style.boxShadow = "0 2px 8px rgba(0,0,0,0.06)"}
            onMouseLeave={e => e.currentTarget.style.boxShadow = "none"}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div>

// ─── STAFF MODAL ───
function StaffModal({ person, c, onSave, onClose }) {
  const [f, setF] = useState(JSON.parse(JSON.stringify(person)));
  const up = (k, v) => setF(p => ({ ...p, [k]: v }));
  const allRoles = [...(c.rolIrakaslegoa || ROLAK_IRAKASLEGOA), ...(c.rolPas || ROLAK_PAS), ...(c.rolOrokorra || ROLAK_OROKORRA)];
  const mails = f.etapa ? ((c.mailak || {})[f.etapa] || MAILAK[f.etapa] || []) : [];
  const togR = r => { const a = [...f.rolak]; const i = a.indexOf(r); if (i >= 0) a.splice(i, 1); else a.push(r); up("rolak", a); };

  return (
    <div style={S.overlay} onClick={onClose}>
      <div style={{ ...S.modal, maxWidth: 520 }} onClick={e => e.stopPropagation()}>
        <h3 style={{ color: "#1e3a5f", margin: "0 0 16px", fontFamily: "'Source Serif 4', serif", fontSize: 19 }}>
          {person.izena ? "Langilea editatu" : "Langile berria"}

        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          <div><label style={S.label}>Izena *</label><input value={f.izena} onChange={e => up("izena", e.target.value)} style={S.input} /></div>
          <div><label style={S.label}>Emaila</label><input value={f.email} onChange={e => up("email", e.target.value)} style={S.input} /></div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <div><label style={S.label}>Etapa</label>
              <select value={f.etapa || ""} onChange={e => up("etapa", e.target.value || null)} style={S.select}>
                <option value="">— Transbertsala</option>
                {(c.etapak || ETAPAK).map(e => <option key={e} value={e}>{e}</option>)}
              </select>
            </div>
            <div><label style={S.label}>Maila</label>
              <select value={f.maila || ""} onChange={e => up("maila", e.target.value || null)} style={S.select}>
                <option value="">—</option>{mails.map(m => <option key={m} value={m}>{m}</option>)}

            </div>
          </div>

            <label style={S.label}>Rolak</label>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
              {allRoles.map(r => (
                <button key={r} onClick={() => togR(r)} style={{
                  padding: "4px 10px", borderRadius: 6, fontSize: 11, cursor: "pointer", fontFamily: "inherit",
                  border: `1.5px solid ${f.rolak.includes(r) ? "#1e3a5f" : "#d1d5db"}`,
                  background: f.rolak.includes(r) ? "#e0e7ef" : "#fff",
                  color: f.rolak.includes(r) ? "#1e3a5f" : "#6b7280", fontWeight: f.rolak.includes(r) ? 600 : 400,
                }}>{r}</button>
              ))}
            </div>
          </div>
        </div>
        <div style={{ display: "flex", gap: 10, justifyContent: "flex-end", marginTop: 20 }}>
          <button onClick={onClose} style={S.btnSec}>Utzi</button>
          <button onClick={() => { if (!f.izena) return; onSave(f); }} style={S.btnPri}>💾 Gorde</button>
        </div>
      </div>
    </div>
  );
}

// ─── KATEGORIAK EDITOR ───
function KategoriakEditor({ kategoriak, onChange, toast }) {
  const [newName, setNewName] = useState("");
  const [newColor, setNewColor] = useState("#6366f1");

  const add = () => {
    if (!newName.trim()) return;
    const id = newName.trim().toLowerCase().replace(/\s+/g, "_").replace(/[^a-z0-9_]/g, "");
    onChange([...kategoriak, { id, izena: newName.trim(), kolorea: newColor }]);
    setNewName(""); toast("Kategoria gehituta");
  };
  const remove = (i) => { const a = [...kategoriak]; a.splice(i, 1); onChange(a); toast("Ezabatuta"); };
  const updateColor = (i, color) => { const a = [...kategoriak]; a[i] = { ...a[i], kolorea: color }; onChange(a); };
  const updateName = (i, name) => { const a = [...kategoriak]; a[i] = { ...a[i], izena: name }; onChange(a); };

  return (
    <div style={{ background: "#fff", borderRadius: 10, padding: 20, border: "1px solid #e5ddd3", maxWidth: 500 }}>
      <p style={{ fontSize: 12, color: "#8b7e74", marginBottom: 14 }}>Kategoriak atazei koloreak emateko erabiltzen dira egutegian.</p>
      <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 16 }}>
        {kategoriak.map((k, i) => (
          <div key={k.id} style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <input type="color" value={k.kolorea} onChange={e => updateColor(i, e.target.value)}
              style={{ width: 32, height: 32, border: "none", borderRadius: 6, cursor: "pointer", padding: 0 }} />
            <input value={k.izena} onChange={e => updateName(i, e.target.value)}
              style={{ ...S.input, flex: 1, borderLeft: `4px solid ${k.kolorea}` }} />
            <button onClick={() => remove(i)} style={{ ...S.btnIcon, color: "#ef4444" }}>🗑️</button>
          </div>
        ))}
      </div>
      <div style={{ display: "flex", gap: 8 }}>
        <input type="color" value={newColor} onChange={e => setNewColor(e.target.value)}
          style={{ width: 32, height: 32, border: "none", borderRadius: 6, cursor: "pointer", padding: 0 }} />
        <input value={newName} onChange={e => setNewName(e.target.value)} placeholder="Kategoria berria..."
          style={{ ...S.input, flex: 1 }} onKeyDown={e => e.key === "Enter" && add()} />
        <button onClick={add} style={S.btnSm}>+ Gehitu</button>
      </div>
    </div>
  );
}

        <KategoriakEditor kategoriak={c.kategoriak || KATEGORIAK_LEHENESPENAK} onChange={(k) => upCamp({ kategoriak: k })} toast={toast} />

                      {m}<button onClick={() => { const a = [...ml]; a.splice(i, 1); upCamp({ mailak: { ...c.mailak, [etapa]: a } }); toast("Ezabatuta"); }}
                        style={{ background: "none", border: "none", color: "#ef4444", cursor: "pointer", fontSize: 10, padding: 0 }}>✕</button>
                    </span>
                  ))}
                </div>
                <input placeholder="Maila berria + Enter" style={{ ...S.input, fontSize: 12 }}

              {section.items.map((item, i) => (
                <span key={item} style={{ background: "#f3f4f6", borderRadius: 6, padding: "5px 12px", fontSize: 13, color: "#374151", display: "inline-flex", alignItems: "center", gap: 6 }}>
                  {item}<button onClick={() => remFrom(section.id, section.items, i)}
