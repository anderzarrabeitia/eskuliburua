// ─── USER: PROFILE SETUP ───
function UserProfileSetup({ campaign, profile, onSave, onBack }) {
  const [selectedId, setSelectedId] = useState(profile && profile.id || "");
  const [customMode, setCustomMode] = useState(profile && profile.id && profile.id.startsWith("custom_") || false);
  const [customName, setCustomName] = useState((profile || {}).izena || "");
  const [customRoles, setCustomRoles] = useState((profile || {}).rolak || []);
  const [customEtapa, setCustomEtapa] = useState((profile || {}).etapa || null);
  const [customMaila, setCustomMaila] = useState((profile || {}).maila || null);

  const person = !customMode ? campaign.langileak.find(l => l.id === selectedId) : null;
  const allRoles = [...(campaign.rolIrakaslegoa || ROLAK_IRAKASLEGOA), ...(campaign.rolPas || ROLAK_PAS), ...(campaign.rolOrokorra || ROLAK_OROKORRA)];
  const mailakForEtapa = customEtapa ? ((campaign.mailak || {})[customEtapa] || MAILAK[customEtapa] || []) : [];

  useEffect(() => {
    if (person) { setCustomRoles(person.rolak || []); setCustomEtapa(person.etapa); setCustomMaila(person.maila); }
  }, [selectedId]);

  const togR = r => { const a = [...customRoles]; const i = a.indexOf(r); if (i >= 0) a.splice(i, 1); else a.push(r); setCustomRoles(a); };

  const handleSave = () => {
    if (customMode) {
      if (!customName.trim()) return;
      onSave({ id: "custom_" + Date.now(), izena: customName.trim(), etapa: customEtapa, maila: customMaila, rolak: customRoles, email: "" });
    } else {
      if (!selectedId) return;
      onSave({ id: selectedId, izena: (person || {}).izena || "", etapa: customEtapa, maila: customMaila || (person || {}).maila, rolak: customRoles, email: (person || {}).email || "" });
    }
  };

  const showForm = customMode || person;

  return (
    <div style={{ minHeight: "100vh", background: "#f0ebe3", fontFamily: "'Outfit', sans-serif", display: "flex", alignItems: "center", justifyContent: "center" }}>
      <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
      <div style={{ background: "#fff", borderRadius: 16, padding: "36px 40px", maxWidth: 500, width: "94%", boxShadow: "0 4px 24px rgba(0,0,0,0.06)" }}>
        <button onClick={onBack} style={{ ...S.btnIcon, marginBottom: 8, fontSize: 12, color: "#6b7280" }}>← Atzera</button>
        <h2 style={{ color: "#1e3a5f", fontSize: 20, margin: "0 0 4px", fontFamily: "'Source Serif 4', serif" }}>Nire profila</h2>
        <p style={{ color: "#8b7e74", fontSize: 12, margin: "0 0 20px" }}>{campaign.izena} · {campaign.ikasturtea}</p>

        <div style={{ marginBottom: 16 }}>
          {!customMode ? (
            <>
              <label style={S.label}>Nire izena *</label>
              <select value={selectedId} onChange={e => setSelectedId(e.target.value)} style={{ ...S.select, fontSize: 14 }}>
                <option value="">Hautatu zure izena...</option>
                {[...campaign.langileak].sort((a, b) => a.izena.localeCompare(b.izena, "eu")).map(l => <option key={l.id} value={l.id}>{l.izena} {l.etapa ? `(${l.etapa}${l.maila ? ` · ${l.maila}` : ""})` : ""}</option>)}
              </select>
              <button onClick={() => setCustomMode(true)} style={{ background: "none", border: "none", color: "#3b82f6", fontSize: 12, cursor: "pointer", marginTop: 8, padding: 0, fontFamily: "inherit" }}>
                + Nire izena ez dago zerrendan
              </button>
            </>
          ) : (
            <>
              <label style={S.label}>Nire izena *</label>
              <input value={customName} onChange={e => setCustomName(e.target.value)} style={{ ...S.input, fontSize: 14 }} placeholder="Zure izen-abizenak" />
              <button onClick={() => { setCustomMode(false); setCustomName(""); }} style={{ background: "none", border: "none", color: "#3b82f6", fontSize: 12, cursor: "pointer", marginTop: 8, padding: 0, fontFamily: "inherit" }}>
                ← Zerrendatik hautatu
              </button>
            </>
          )}
        </div>

        {showForm && (
          <>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
              <div>
                <label style={S.label}>Etapa</label>
                <select value={customEtapa || ""} onChange={e => { setCustomEtapa(e.target.value || null); setCustomMaila(null); }} style={S.select}>
                  <option value="">— Transbertsala</option>
                  {(campaign.etapak || ETAPAK).map(e => <option key={e} value={e}>{e}</option>)}
                </select>
              </div>
              <div>
                <label style={S.label}>Maila</label>
                <select value={customMaila || ""} onChange={e => setCustomMaila(e.target.value || null)} style={S.select}>
                  <option value="">—</option>
                  {mailakForEtapa.map(m => <option key={m} value={m}>{m}</option>)}
                </select>
              </div>
            </div>
            <div style={{ marginBottom: 20 }}>
              <label style={S.label}>Nire rolak</label>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
                {allRoles.map(r => (
                  <button key={r} onClick={() => togR(r)} style={{
                    padding: "5px 11px", borderRadius: 7, fontSize: 12, cursor: "pointer", fontFamily: "inherit",
                    border: `1.5px solid ${customRoles.includes(r) ? "#1e3a5f" : "#d1d5db"}`,
                    background: customRoles.includes(r) ? "#e0e7ef" : "#fff",
                    color: customRoles.includes(r) ? "#1e3a5f" : "#9ca3af", fontWeight: customRoles.includes(r) ? 600 : 400,
                  }}>{r}</button>
                ))}
              </div>
            </div>
            <button onClick={handleSave} style={{ ...S.btnPri, width: "100%", padding: "12px 20px", fontSize: 14 }}>💾 Profila gorde eta sartu</button>
          </>
        )}
      </div>
    </div>
  );
}

// ─── USER: MAIN VIEW ───
function UserMainView({ campaign, profile, completed, onToggleComplete, onEditProfile, onLogout, toast, showToast }) {
  const [viewMode, setViewMode] = useState("zerrenda");
  const [showInfo, setShowInfo] = useState(false);
  const [selectedTask, setSelectedTask] = useState(null);
  const [filterDone, setFilterDone] = useState("pending");
  const [filterKat, setFilterKat] = useState("all");
  const [filterDate, setFilterDate] = useState("all");
  const [filterText, setFilterText] = useState("");

  // Filter tasks relevant to this user
  const myTasks = useMemo(() => {
    if (!campaign || !profile) return [];
    return campaign.atazak.filter(t => {
      const filtroEtapak = (t.filtroak && t.filtroak.etapak) || [];
      const hasFiltro = filtroEtapak.length > 0;
      const userInFiltro = !hasFiltro || filtroEtapak.includes(profile.etapa);

      const matchesAssignment = (list) => list.some(a => {
        if (a.mota === "pertsona" && a.balioa === profile.id) return true;
        if (!userInFiltro) return false;
        if (a.mota === "rola" && profile.rolak.includes(a.balioa)) return true;
        if (a.mota === "etapa" && a.balioa === profile.etapa) return true;
        if (a.mota === "maila" && a.balioa === profile.maila) return true;
        return false;
      });
      const isDirect = matchesAssignment(t.arduradunak);
      const isInfo = showInfo && matchesAssignment(t.informatiboak);
      return isDirect || isInfo;
    });
  }, [campaign, profile, showInfo]);

  // Date range helpers
  const today = toDateStr(new Date());
  const getWeekRange = (offset) => {
    const now = new Date();
    const mon = new Date(now); mon.setDate(now.getDate() - ((now.getDay() + 6) % 7) + (offset * 7));
    const fri = new Date(mon); fri.setDate(mon.getDate() + 4);
    return { start: toDateStr(mon), end: toDateStr(fri) };
  };
  const getMonthRange = () => {
    const now = new Date();
    const start = new Date(now.getFullYear(), now.getMonth(), 1);
    const end = new Date(now.getFullYear(), now.getMonth() + 1, 0);
    return { start: toDateStr(start), end: toDateStr(end) };
  };

  // Apply all filters
  const filteredTasks = useMemo(() => {
    let tasks = myTasks;
    if (filterDone === "pending") tasks = tasks.filter(t => !completed[t.id]);
    else if (filterDone === "done") tasks = tasks.filter(t => completed[t.id]);
    if (filterKat !== "all") tasks = tasks.filter(t => (t.kategoria || "bestelakoa") === filterKat);
    if (filterDate !== "all") {
      let range;
      if (filterDate === "week") range = getWeekRange(0);
      else if (filterDate === "next") range = getWeekRange(1);
      else if (filterDate === "month") range = getMonthRange();
      if (range) tasks = tasks.filter(t => !t.data || (t.data >= range.start && t.data <= range.end));
    }
    if (filterText) {
      const s = filterText.toLowerCase();
      tasks = tasks.filter(t => t.izenburua.toLowerCase().includes(s) || (t.argibideak || "").toLowerCase().includes(s));
    }
    tasks.sort((a, b) => (a.data || "9999") < (b.data || "9999") ? -1 : 1);
    return tasks;
  }, [myTasks, completed, filterDone, filterKat, filterDate, filterText]);

  const pendingCount = myTasks.filter(t => !completed[t.id]).length;
  const doneCount = myTasks.filter(t => completed[t.id]).length;

  const getStatus = (task) => {
    if (completed[task.id]) return "done";
    if (!task.data) return "normal";
    const diff = Math.ceil((new Date(task.data + "T23:59:59") - new Date()) / 86400000);
    if (diff < 0) return "overdue";
    if (diff === 0) return "today";
    if (diff <= 2) return "soon";
    return "normal";
  };

  const STATUS_COLORS = { done: "#10b981", overdue: "#ef4444", today: "#ef4444", soon: "#f59e0b", normal: "#6b7280" };
  const STATUS_BG = { done: "#ecfdf5", overdue: "#fef2f2", today: "#fef2f2", soon: "#fffbeb", normal: "#fff" };
  const STATUS_LABELS = { done: "✅ Eginda", overdue: "🔴 Epez kanpo!", today: "🔴 Gaur!", soon: "🟡 Laster", normal: "" };

  // Print handler
  const handlePrint = (mode, tasks, camp, completed, getStatus, STATUS_COLORS) => {
    const w = window.open("", "_blank");
    if (!w) return;
    const cal = tasks.filter(t => t.mota === "egutegikoa" && t.data);
    const gen = tasks.filter(t => t.mota === "orokorra");

    let html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
      <style>body{font-family:Arial,sans-serif;margin:20px;color:#333;font-size:13px}
      h1{font-size:18px;margin-bottom:4px}h2{font-size:14px;color:#666;margin-bottom:16px}
      .task{page-break-inside:avoid;margin-bottom:16px;padding:12px;border:1px solid #ddd;border-radius:8px;border-left:4px solid #1e3a5f}
      .task h3{font-size:14px;margin:0 0 4px}.task .meta{font-size:11px;color:#888;margin-bottom:6px}
      .task .desc{font-size:12px;line-height:1.5;white-space:pre-wrap;margin-bottom:6px}
      .task .link{font-size:11px;color:#1e3a5f;margin:2px 0}.task .ruta{font-size:10px;color:#888}
      .task img{max-width:300px;max-height:200px;border-radius:4px;margin-top:6px}
      .cal-grid{display:grid;grid-template-columns:repeat(5,1fr);border:1px solid #ccc;font-size:11px}
      .cal-header{background:#1e3a5f;color:#fff;padding:6px;text-align:center;font-weight:bold}
      .cal-day{border:1px solid #eee;padding:4px;min-height:70px;vertical-align:top}
      .cal-day .num{text-align:right;font-weight:bold;font-size:12px;color:#999;margin-bottom:3px}
      .cal-chip{padding:2px 5px;margin-bottom:2px;border-radius:3px;font-size:10px;border-left:3px solid #1e3a5f;background:#f5f5f5}
      .gen-section{margin-top:16px;padding-top:12px;border-top:2px solid #ddd}
      @page{margin:12mm}
      ${mode === "egutegia" ? "@page{size:landscape}" : ""}
      <` + `/style><` + `/head><body>
      <h1>📋 ESKULIBURUA — ${campaign.izena}<` + `/h1>
      <h2>${profile.izena} · ${[profile.etapa, profile.maila].filter(Boolean).join(" · ")} · ${profile.rolak.join(", ")}<` + `/h2>`;

    if (mode === "egutegia") {
      // Calendar print
      const dates = cal.map(t => t.data).sort();
      if (dates.length > 0) {
        const first = new Date(dates[0] + "T12:00:00");
        const last = new Date(dates[dates.length - 1] + "T12:00:00");
        const startMon = new Date(first); startMon.setDate(first.getDate() - ((first.getDay() + 6) % 7));
        const endFri = new Date(last); endFri.setDate(last.getDate() + (4 - (last.getDay() + 6) % 7));
        const byDate = {}; cal.forEach(t => { if (!byDate[t.data]) byDate[t.data] = []; byDate[t.data].push(t); });
        const dayNames = ["Al.", "Ar.", "Az.", "Og.", "Or."];
        html += '<div class="cal-grid">';
        dayNames.forEach(d => { html += `<div class="cal-header">${d}</div>`; });
        const cursor = new Date(startMon);
        while (cursor <= endFri) {
          for (let i = 0; i < 5; i++) {
            const ds = toDateStr(new Date(cursor));
            const dt = new Date(cursor);
            const dayTasks = byDate[ds] || [];
            html += `<div class="cal-day"><div class="num">${dt.getDate()}</div>`;
            dayTasks.forEach(t => {
              const done = completed[t.id];
              html += `<div class="cal-chip" style="${done ? "text-decoration:line-through;opacity:0.5" : ""}">${t.izenburua}</div>`;
            });
            html += '</div>';
            cursor.setDate(cursor.getDate() + 1);
          }
          cursor.setDate(cursor.getDate() + 2);
        }
        html += '</div>';
      }
      if (gen.length > 0) {
        html += '<div class="gen-section"><b>📌 Mugaegunarekin:</b>';
        gen.forEach(t => { html += `<div class="cal-chip" style="margin-top:4px">${t.izenburua} — ${fmtDate(t.data)}</div>`; });
        html += '</div>';
      }
    } else {
      // List print: task + description + links
      const allTasks = [...cal, ...gen];
      allTasks.forEach(t => {
        const status = getStatus(t);
        const done = completed[t.id];
        const estekak = t.estekak || [];
        html += `<div class="task" style="border-left-color:${STATUS_COLORS[status]}${done ? ";opacity:0.5" : ""}">`;
        html += `<h3>${done ? "✅ " : ""}${t.izenburua}</h3>`;
        html += `<div class="meta">📅 ${fmtDate(t.data)}${t.ordua ? ` · ⏰ ${t.ordua}` : ""}${t.mota === "orokorra" ? " · 📌 Mugaeguna" : ""}</div>`;
        if (t.argibideak) html += `<div class="desc">${t.argibideak}</div>`;
        if (t.irudia) html += `<img src="${t.irudia}" />`;
        estekak.forEach(l => {
          html += `<div class="link">🔗 <b>${l.izena}</b>${l.url ? ` — ${l.url}` : ""}${l.ruta ? `<div class="ruta">📁 ${l.ruta}</div>` : ""}</div>`;
        });
        html += '</div>';
      });
    }

    html += '<' + '/body><' + '/html>';
    w.document.write(html);
    w.document.close();
    setTimeout(() => w.print(), 500);
  };

  return (
    <div style={{ minHeight: "100vh", background: "#f0ebe3", fontFamily: "'Outfit', sans-serif" }}>
      <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />

      {/* Header */}
      <div style={{ background: "#fff", borderBottom: "1px solid #e5ddd3", padding: "12px 20px", display: "flex", alignItems: "center", gap: 12, position: "sticky", top: 0, zIndex: 50 }}>
        <div style={{ width: 36, height: 36, background: "#1e3a5f", borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, color: "#fff", flexShrink: 0 }}>📋</div>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontWeight: 700, fontSize: 14, color: "#1e3a5f" }}>{profile.izena}</div>
          <div style={{ fontSize: 11, color: "#8b7e74" }}>{[profile.etapa, profile.maila].filter(Boolean).join(" · ")} — {profile.rolak.join(", ")}</div>
        </div>
        <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
          <button onClick={() => handlePrint(viewMode, filteredTasks, campaign, completed, getStatus, STATUS_COLORS)}
            style={S.btnSm} title="Inprimatu">🖨️</button>
          <button onClick={onEditProfile} style={S.btnSm} title="Profila editatu">⚙️</button>
          <button onClick={onLogout} style={S.btnSm} title="Irten">🚪</button>
        </div>
      </div>

      {/* Filters bar */}
      <div style={{ padding: "12px 20px", display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center", background: "#fff", borderBottom: "1px solid #e5ddd3" }}>
        {/* Stats */}
        <div style={{ display: "flex", gap: 12, fontSize: 13, marginRight: 8 }}>
          <span style={{ color: "#ef4444" }}>⏳ <b>{pendingCount}</b></span>
          <span style={{ color: "#10b981" }}>✅ <b>{doneCount}</b></span>
        </div>

        {/* View toggle */}
        <div style={{ display: "flex", background: "#f5f1eb", borderRadius: 8, padding: 2 }}>
          {[{ id: "zerrenda", icon: "☰", label: "Zerrenda" }, { id: "egutegia", icon: "📅", label: "Egutegia" }].map(v => (
            <button key={v.id} onClick={() => setViewMode(v.id)} style={{
              padding: "5px 12px", borderRadius: 6, border: "none", fontSize: 12, cursor: "pointer",
              fontFamily: "inherit", fontWeight: viewMode === v.id ? 600 : 400,
              background: viewMode === v.id ? "#1e3a5f" : "transparent", color: viewMode === v.id ? "#fff" : "#6b7280",
            }}>{v.icon} {v.label}</button>
          ))}
        </div>

        {/* Done filter */}
        <div style={{ display: "flex", background: "#f5f1eb", borderRadius: 8, padding: 2 }}>
          {[{ id: "pending", l: "Pendienteak" }, { id: "all", l: "Guztiak" }, { id: "done", l: "Eginak" }].map(f => (
            <button key={f.id} onClick={() => setFilterDone(f.id)} style={{
              padding: "5px 10px", borderRadius: 6, border: "none", fontSize: 11, cursor: "pointer", fontFamily: "inherit",
              fontWeight: filterDone === f.id ? 600 : 400,
              background: filterDone === f.id ? "#1e3a5f" : "transparent", color: filterDone === f.id ? "#fff" : "#6b7280",
            }}>{f.l}</button>
          ))}
        </div>

        {/* Date filter */}
        <select value={filterDate} onChange={e => setFilterDate(e.target.value)} style={{ ...S.select, width: "auto", fontSize: 12, padding: "5px 10px", background: filterDate !== "all" ? "#dbeafe" : "#f5f1eb", borderColor: filterDate !== "all" ? "#3b82f6" : "#d1d5db" }}>
          <option value="all">📅 Data guztiak</option>
          <option value="week">Aste hau</option>
          <option value="next">Hurrengo astea</option>
          <option value="month">Hilabete hau</option>
        </select>

        {/* Category filter */}
        <select value={filterKat} onChange={e => setFilterKat(e.target.value)} style={{ ...S.select, width: "auto", fontSize: 12, padding: "5px 10px", background: filterKat !== "all" ? "#dbeafe" : "#f5f1eb", borderColor: filterKat !== "all" ? "#3b82f6" : "#d1d5db" }}>
          <option value="all">🏷️ Kategoria guztiak</option>
          {(campaign.kategoriak || KATEGORIAK_LEHENESPENAK).map(k => (
            <option key={k.id} value={k.id}>{k.izena}</option>
          ))}
        </select>

        {/* Search */}
        <input type="text" placeholder="🔍 Bilatu..." value={filterText} onChange={e => setFilterText(e.target.value)}
          style={{ ...S.input, width: 160, fontSize: 12, padding: "5px 10px", background: "#f5f1eb" }} />

        {/* Info toggle */}
        <label style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11, color: "#6b7280", cursor: "pointer" }}>
          <input type="checkbox" checked={showInfo} onChange={e => setShowInfo(e.target.checked)} style={{ accentColor: "#1e3a5f" }} />
          ℹ️ Info
        </label>

        {/* Active filters indicator */}
        {(filterKat !== "all" || filterDate !== "all" || filterText) && (
          <button onClick={() => { setFilterKat("all"); setFilterDate("all"); setFilterText(""); }} style={{ background: "none", border: "none", color: "#ef4444", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>
            ✕ Iragazkiak garbitu
          </button>
        )}
      </div>

      {/* Content */}
      <div style={{ padding: "0 20px 80px", background: "#e8e0d4", minHeight: "calc(100vh - 160px)" }}>
        {viewMode === "zerrenda"
          ? <UserListView tasks={filteredTasks} campaign={campaign} completed={completed} getStatus={getStatus}
              STATUS_COLORS={STATUS_COLORS} STATUS_BG={STATUS_BG} STATUS_LABELS={STATUS_LABELS}
              onSelect={setSelectedTask} />
          : <UserCalendarView tasks={filteredTasks} campaign={campaign} completed={completed} getStatus={getStatus}
              STATUS_COLORS={STATUS_COLORS} STATUS_BG={STATUS_BG}
              onSelect={setSelectedTask} />
        }
        {filteredTasks.length === 0 && (
          <div style={{ textAlign: "center", padding: 40, color: "#9ca3af" }}>
            {filterDone === "pending" ? "🎉 Ez duzu ataza pendienterik!" : "Ez dago atazorik."}
          </div>
        )}
      </div>

      {/* Task detail modal */}
      {selectedTask && (
        <UserTaskDetail task={selectedTask} campaign={campaign} completed={completed}
          getStatus={getStatus} STATUS_COLORS={STATUS_COLORS} STATUS_LABELS={STATUS_LABELS}
          onToggle={() => onToggleComplete(selectedTask.id)}
          onClose={() => setSelectedTask(null)} />
      )}

      {toast && <div style={{ position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)", background: "#1e3a5f", color: "#fff", padding: "10px 22px", borderRadius: 10, fontWeight: 600, fontSize: 13, zIndex: 300, boxShadow: "0 4px 16px rgba(0,0,0,0.15)" }}>{toast}</div>}
      <style>{`@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}`}</style>
    </div>
  );
}

// ─── USER: LIST VIEW ───
function UserListView({ tasks, campaign, completed, getStatus, STATUS_COLORS, STATUS_BG, STATUS_LABELS, onSelect }) {
  const cal = tasks.filter(t => t.mota === "egutegikoa");
  const gen = tasks.filter(t => t.mota === "orokorra");

  // Group by day
  const days = useMemo(() => {
    const m = new Map();
    cal.forEach(t => { if (!m.has(t.data)) m.set(t.data, []); m.get(t.data).push(t); });
    return [...m.entries()].sort((a, b) => a[0] < b[0] ? -1 : 1);
  }, [cal]);

  return (
    <>
      {days.map(([date, dayTasks]) => (
        <div key={date} style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: "#1e3a5f", marginBottom: 6, fontFamily: "'Source Serif 4', serif" }}>
            {fmtDate(date)}
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
            {dayTasks.map(t => {
              const status = getStatus(t);
              const isDone = !!completed[t.id];
              const kat = (campaign.kategoriak || KATEGORIAK_LEHENESPENAK).find(k => k.id === t.kategoria);
              const katColor = (kat && kat.kolorea) || "#6b7280";
              const estekak = t.estekak || [];
              return (
                <div key={t.id} onClick={() => onSelect(t)} style={{
                  background: STATUS_BG[status], border: `1px solid ${STATUS_COLORS[status]}30`,
                  borderLeft: `5px solid ${katColor}`, borderRadius: 10,
                  padding: "10px 14px", cursor: "pointer", transition: "box-shadow .15s",
                  opacity: isDone ? 0.6 : 1,
                }} onMouseEnter={e => e.currentTarget.style.boxShadow = "0 2px 8px rgba(0,0,0,0.08)"}
                   onMouseLeave={e => e.currentTarget.style.boxShadow = "none"}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 600, fontSize: 14, color: isDone ? "#9ca3af" : "#1f2937", textDecoration: isDone ? "line-through" : "none" }}>{t.izenburua}</div>
                      <div style={{ fontSize: 11, color: "#8b7e74", marginTop: 2 }}>
                        {kat && <span style={{ color: katColor, marginRight: 6, fontWeight: 600 }}>{kat.izena}</span>}
                        {t.ordua && <span style={{ marginRight: 6 }}>⏰ {t.ordua}</span>}
                        {estekak.length > 0 && <span style={{ marginRight: 6 }}>🔗 {estekak.length} esteka</span>}
                        {t.argibideak && <span>📝 Argibideak</span>}
                      </div>
                    </div>
                    {STATUS_LABELS[status] && <span style={{ fontSize: 11, fontWeight: 600, color: STATUS_COLORS[status], whiteSpace: "nowrap" }}>{STATUS_LABELS[status]}</span>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      ))}
      {gen.length > 0 && (
        <div style={{ marginTop: 10 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: "#d97706", marginBottom: 6, fontFamily: "'Source Serif 4', serif" }}>📌 Mugaegunarekin</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
            {gen.map(t => {
              const status = getStatus(t);
              const isDone = !!completed[t.id];
              return (
                <div key={t.id} onClick={() => onSelect(t)} style={{
                  background: STATUS_BG[status], border: `1px solid ${STATUS_COLORS[status]}30`,
                  borderLeft: "4px solid #d97706", borderRadius: 10,
                  padding: "10px 14px", cursor: "pointer", opacity: isDone ? 0.6 : 1,
                }}>
                  <div style={{ fontWeight: 600, fontSize: 14, color: isDone ? "#9ca3af" : "#1f2937", textDecoration: isDone ? "line-through" : "none" }}>{t.izenburua}</div>
                  <div style={{ fontSize: 11, color: "#8b7e74", marginTop: 2 }}>Mugaeguna: {fmtDate(t.data)}</div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </>
  );
}

// ─── USER: CALENDAR VIEW ───
function UserCalendarView({ tasks, campaign, completed, getStatus, STATUS_COLORS, STATUS_BG, onSelect }) {
  const calTasks = tasks.filter(t => t.mota === "egutegikoa" && t.data);
  const genTasks = tasks.filter(t => t.mota === "orokorra");
  const dates = calTasks.map(t => t.data).sort();
  const today = toDateStr(new Date());

  const weeks = useMemo(() => {
    if (dates.length === 0) return [];
    const first = new Date(dates[0] + "T12:00:00");
    const last = new Date(dates[dates.length - 1] + "T12:00:00");
    const startMon = new Date(first); startMon.setDate(first.getDate() - ((first.getDay() + 6) % 7));
    const endFri = new Date(last); endFri.setDate(last.getDate() + (4 - (last.getDay() + 6) % 7));
    const wks = [];
    const cursor = new Date(startMon);
    while (cursor <= endFri) {
      const week = [];
      for (let i = 0; i < 5; i++) { week.push(toDateStr(new Date(cursor))); cursor.setDate(cursor.getDate() + 1); }
      wks.push(week); cursor.setDate(cursor.getDate() + 2);
    }
    return wks;
  }, [dates]);

  const byDate = useMemo(() => {
    const m = {}; calTasks.forEach(t => { if (!m[t.data]) m[t.data] = []; m[t.data].push(t); }); return m;
  }, [calTasks]);

  const dayNames = ["Al.", "Ar.", "Az.", "Og.", "Or."];
  const monthNames = ["Urtarila", "Otsaila", "Martxoa", "Apirila", "Maiatza", "Ekaina", "Uztaila", "Abuztua", "Iraila", "Urria", "Azaroa", "Abendua"];

  if (weeks.length === 0) return <p style={{ color: "#9ca3af", textAlign: "center", padding: 40 }}>Ez dago egutegiko atazorik.</p>;

  return (
    <div>
    <div style={{ background: "#fff", borderRadius: 12, border: "2px solid #c4bdb4", overflow: "hidden", boxShadow: "0 2px 12px rgba(0,0,0,0.08)" }}>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(5, minmax(0, 1fr))", borderBottom: "2px solid #e5ddd3" }}>
        {dayNames.map(d => <div key={d} style={{ padding: "8px 6px", fontSize: 11, fontWeight: 700, color: "#8b7e74", textAlign: "center", textTransform: "uppercase", minWidth: 0 }}>{d}</div>)}
      </div>
      {weeks.map((week, wi) => {
        const fd = new Date(week[0] + "T12:00:00");
        const prevEnd = wi > 0 ? new Date(weeks[wi - 1][4] + "T12:00:00") : null;
        const showMonth = wi === 0 || (prevEnd && fd.getMonth() !== prevEnd.getMonth());
        return (
          <div key={wi}>
            {showMonth && <div style={{ padding: "8px 12px 2px", fontSize: 13, fontWeight: 700, color: "#1e3a5f", fontFamily: "'Source Serif 4', serif", background: "#faf8f5", borderTop: wi > 0 ? "2px solid #e5ddd3" : "none" }}>{monthNames[fd.getMonth()]}</div>}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(5, minmax(0, 1fr))", minHeight: 90, borderBottom: "2px solid #e5ddd3" }}>
              {week.map((dateStr, di) => {
                const dt = new Date(dateStr + "T12:00:00");
                const dayTasks = byDate[dateStr] || [];
                const isToday = dateStr === today;
                const hasTasks = dayTasks.length > 0;
                return (
                  <div key={dateStr} style={{ borderRight: di < 4 ? "1px solid #e5ddd3" : "none", padding: "5px 6px", minWidth: 0, overflow: "hidden", background: isToday ? "#dbeafe" : hasTasks ? (wi % 2 === 0 ? "#faf8f5" : "#fff") : (wi % 2 === 0 ? "#f5f1eb" : "#faf8f5"), minHeight: 90 }}>
                    <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 3 }}>
                      <span style={{ fontSize: 12, fontWeight: 600, color: isToday ? "#fff" : dayTasks.length > 0 ? "#1e3a5f" : "#d1c9bc", background: isToday ? "#3b82f6" : "transparent", borderRadius: "50%", width: 22, height: 22, display: "flex", alignItems: "center", justifyContent: "center" }}>{dt.getDate()}</span>
                    </div>
                    {dayTasks.map(t => {
                      const status = getStatus(t);
                      const isDone = !!completed[t.id];
                      const kat = (campaign.kategoriak || KATEGORIAK_LEHENESPENAK).find(k => k.id === t.kategoria);
                      const katColor = (kat && kat.kolorea) || "#6b7280";
                      return (
                        <div key={t.id} onClick={() => onSelect(t)} title={t.izenburua} style={{
                          background: isDone ? "#ecfdf5" : katColor + "15", borderLeft: `3px solid ${isDone ? "#10b981" : katColor}`,
                          borderRadius: 4, padding: "4px 7px", fontSize: 13, fontWeight: 500, marginBottom: 2,
                          color: isDone ? "#6ee7b7" : "#374151", cursor: "pointer",
                          textDecoration: isDone ? "line-through" : "none",
                          whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", lineHeight: 1.35,
                        }}>{t.ordua && <span style={{ opacity: 0.6, marginRight: 2, fontSize: 10 }}>⏰</span>}{t.izenburua}</div>
                      );
                    })}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
    {/* General tasks */}
    {genTasks.length > 0 && (
      <div style={{ marginTop: 16 }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: "#d97706", marginBottom: 8, fontFamily: "'Source Serif 4', serif" }}>📌 Mugaegunarekin — bete beharreko dokumentazioa</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(240px, 1fr))", gap: 8 }}>
          {genTasks.map(t => {
            const isDone = !!completed[t.id];
            const kat = (campaign.kategoriak || KATEGORIAK_LEHENESPENAK).find(k => k.id === t.kategoria);
            const katColor = (kat && kat.kolorea) || "#d97706";
            return (
              <div key={t.id} onClick={() => onSelect(t)} style={{
                background: "#fff", border: "1px solid #e5ddd3", borderRadius: 8, padding: "8px 12px",
                cursor: "pointer", borderLeft: `4px solid ${katColor}`,
                opacity: isDone ? 0.5 : 1, textDecoration: isDone ? "line-through" : "none",
              }}>
                <div style={{ fontWeight: 600, fontSize: 13, color: "#1f2937" }}>{t.izenburua}</div>
                <div style={{ fontSize: 11, color: "#9ca3af", marginTop: 2 }}>Mugaeguna: {fmtDate(t.data)}</div>
              </div>
            );
          })}
        </div>
      </div>
    )}
  </div>
  );
}
function ImageLightbox({ src, onClose }) {
  var handleDownload = function() {
    try {
      var link = document.createElement("a");
      link.href = src;
      link.download = "irudia." + (src.indexOf("png") >= 0 ? "png" : "jpg");
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    } catch(e) {
      window.open(src, "_blank");
    }
  };
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.88)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", zIndex: 200 }}
      onClick={onClose}>
      <div style={{ position: "relative", maxWidth: "95vw", maxHeight: "85vh", display: "flex", alignItems: "center", justifyContent: "center" }}
        onClick={function(e) { e.stopPropagation(); }}>
        <img src={src} alt="Irudia" style={{ maxWidth: "95vw", maxHeight: "80vh", objectFit: "contain", borderRadius: 8, boxShadow: "0 8px 40px rgba(0,0,0,0.4)" }} />
      </div>
      <div style={{ display: "flex", gap: 12, marginTop: 16 }} onClick={function(e) { e.stopPropagation(); }}>
        <button onClick={handleDownload} style={{
          background: "#fff", color: "#1e3a5f", border: "none", padding: "10px 24px", borderRadius: 10,
          fontWeight: 600, fontSize: 13, cursor: "pointer", fontFamily: "inherit",
        }}>⬇️ Deskargatu</button>
        <button onClick={onClose} style={{
          background: "rgba(255,255,255,0.15)", color: "#fff", border: "1px solid rgba(255,255,255,0.3)",
          padding: "10px 24px", borderRadius: 10, fontSize: 13, cursor: "pointer", fontFamily: "inherit",
        }}>✕ Itxi</button>
      </div>
    </div>
  );
}

function UserTaskDetail({ task, campaign, completed, getStatus, STATUS_COLORS, STATUS_LABELS, onToggle, onClose }) {
  const [showLightbox, setShowLightbox] = useState(false);
  const status = getStatus(task);
  const isDone = !!completed[task.id];
  const ard = task.arduradunak.map(a => `${MOTA_ICONS[a.mota]} ${getAssignLabel(a, campaign.langileak)}`).join(", ");
  const estekak = task.estekak || [];

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.3)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 100 }}
      onClick={onClose}>
      <div style={{ background: "#fff", borderRadius: "20px 20px 0 0", padding: "24px 24px 32px", maxWidth: 600, width: "100%", maxHeight: "85vh", overflow: "auto", boxShadow: "0 -10px 40px rgba(0,0,0,0.12)" }}
        onClick={e => e.stopPropagation()}>
        <div style={{ width: 40, height: 4, background: "#d1d5db", borderRadius: 2, margin: "0 auto 16px" }} />

        {STATUS_LABELS[status] && (
          <div style={{ display: "inline-block", background: STATUS_COLORS[status] + "15", color: STATUS_COLORS[status], padding: "4px 12px", borderRadius: 20, fontSize: 12, fontWeight: 600, marginBottom: 12 }}>
            {STATUS_LABELS[status]}
          </div>
        )}

        <h3 style={{ color: "#1e3a5f", fontSize: 19, margin: "0 0 8px", fontFamily: "'Source Serif 4', serif", lineHeight: 1.3 }}>{task.izenburua}</h3>

        <div style={{ display: "flex", gap: 12, fontSize: 12, color: "#6b7280", marginBottom: 16, flexWrap: "wrap" }}>
          <span>📅 {fmtDate(task.data)}</span>
          {task.ordua && <span>⏰ {task.ordua}</span>}
          <span>{task.mota === "orokorra" ? "📌 Mugaeguna" : "📅 Egutegikoa"}</span>
        </div>

        {ard && <div style={{ fontSize: 12, color: "#8b7e74", marginBottom: 16 }}>🎯 {ard}</div>}

        {/* Instructions */}
        {task.argibideak && (
          <div style={{ background: "#faf8f5", borderRadius: 10, padding: 16, marginBottom: 16, border: "1px solid #e5ddd3", maxHeight: 300, overflow: "auto" }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: "#8b7e74", textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>Argibideak</div>
            <div style={{ fontSize: 14, color: "#374151", lineHeight: 1.6, whiteSpace: "pre-wrap" }}>{task.argibideak}</div>
          </div>
        )}

        {/* Image — clickable for lightbox */}
        {task.irudia && (
          <div style={{ marginBottom: 16, cursor: "pointer", position: "relative" }}
            onClick={function() { setShowLightbox(true); }}>
            <img src={task.irudia} alt="Atazaren irudia" style={{ maxWidth: "100%", borderRadius: 8, border: "1px solid #e5ddd3", transition: "opacity .15s" }}
              onMouseEnter={function(e) { e.currentTarget.style.opacity = "0.85"; }}
              onMouseLeave={function(e) { e.currentTarget.style.opacity = "1"; }} />
            <div style={{ position: "absolute", bottom: 8, right: 8, background: "rgba(0,0,0,0.6)", color: "#fff", borderRadius: 6, padding: "4px 10px", fontSize: 11, fontWeight: 600 }}>🔍 Zabaldu</div>
          </div>
        )}

        {/* Links */}
        {estekak.length > 0 && (
          <div style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: "#8b7e74", textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>Estekak</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {estekak.map((l, i) => (
                <a key={i} href={l.url || "#"} target="_blank" rel="noopener noreferrer"
                  style={{ background: "#eff6ff", borderRadius: 8, padding: "10px 14px", color: "#1e3a5f",
                    textDecoration: "none", fontSize: 13, display: "block", border: "1px solid #bfdbfe" }}>
                  <div style={{ fontWeight: 600 }}>🔗 {l.izena}</div>
                  {l.ruta && <div style={{ fontSize: 11, color: "#8b7e74", marginTop: 3 }}>📁 {l.ruta}</div>}
                  {l.url && <div style={{ fontSize: 11, color: "#6b7280", marginTop: 2, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{l.url}</div>}
                </a>
              ))}
            </div>
          </div>
        )}

        <button onClick={onToggle} style={{
          width: "100%", padding: "14px 20px", borderRadius: 12, border: "none", fontSize: 15, fontWeight: 700,
          cursor: "pointer", fontFamily: "inherit", transition: "all .2s",
          background: isDone ? "#f3f4f6" : "#10b981", color: isDone ? "#6b7280" : "#fff",
        }}>
          {isDone ? "↩️ Eginda markatu kendu" : "✅ Eginda markatu"}
        </button>
      </div>
      {showLightbox && task.irudia && <ImageLightbox src={task.irudia} onClose={function() { setShowLightbox(false); }} />}
    </div>
  );
}


const S = {
  btnPri: { background: "#1e3a5f", color: "#fff", border: "none", padding: "9px 20px", borderRadius: 8, fontWeight: 600, fontSize: 13, cursor: "pointer", fontFamily: "inherit" },
  btnSec: { background: "#fff", color: "#6b7280", border: "1px solid #d1d5db", padding: "9px 20px", borderRadius: 8, fontSize: 13, cursor: "pointer", fontFamily: "inherit" },

};

<script>
  var errBox = document.getElementById("error-box");
  try {
    if (typeof Babel === "undefined") throw new Error("Babel liburutegia ez da kargatu. Egiaztatu Interneteko konexioa eta CDN baliabideak.");
    if (typeof React === "undefined") throw new Error("React liburutegia ez da kargatu.");
    if (typeof ReactDOM === "undefined") throw new Error("ReactDOM liburutegia ez da kargatu.");
    var code = document.getElementById("app-source").textContent;
    var output = Babel.transform(code, { presets: ["react"] });
    new Function(output.code)();
  } catch(e) {
    errBox.style.display = "block";
    var loc = "";
    if (e.loc && e.loc.line) loc = "\nLerroa: " + e.loc.line + ", zutabea: " + e.loc.column;
    errBox.innerHTML = "<b>ERROREA:</b><br><br>" + e.message + loc + "<br><br>" + (e.stack || "");
    document.getElementById("root").innerHTML = "";
  }
</script>
